version: "3.8"

networks:
  video-automation:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  temp_videos_data:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Base de datos para n8n
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: video_automation_postgres
    restart: unless-stopped
    networks:
      - video-automation
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n_user} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # n8n — Orquestador del workflow
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.30.1
    container_name: video_automation_n8n
    restart: unless-stopped
    networks:
      - video-automation
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Base de datos
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST:-postgres}
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT:-5432}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n_user}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Auth
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # URLs
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      # Timezone
      GENERIC_TIMEZONE: ${TZ:-Europe/Dublin}
      TZ: ${TZ:-Europe/Dublin}
    volumes:
      - n8n_data:/home/node/.n8n
      - temp_videos_data:/tmp/videos
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # File Watcher — Detecta nuevos .md de ViralScout
  # ---------------------------------------------------------------------------
  file-watcher:
    build:
      context: ./file-watcher
      dockerfile: Dockerfile
    container_name: video_automation_watcher
    restart: unless-stopped
    networks:
      - video-automation
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      VIRALSCOUT_WATCH_DIR: ${VIRALSCOUT_WATCH_DIR:-/watch}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/new-script}
      WATCH_POLL_INTERVAL: ${WATCH_POLL_INTERVAL:-5000}
      TEMP_VIDEOS_DIR: /tmp/videos
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-Europe/Dublin}
    volumes:
      # Montar carpeta de ViralScout (read-only)
      # En VPS: /mnt/c/Users/gabri/Desktop/proyectos vs codes/VIralit:/watch:ro
      # En Linux nativo: ajustar según ruta real
      - /mnt/c/Users/gabri/Desktop/proyectos vs codes/VIralit/data/scripts:/watch:ro
      - temp_videos_data:/tmp/videos

  # ---------------------------------------------------------------------------
  # Remotion Renderer — Renderiza videos con React
  # ---------------------------------------------------------------------------
  remotion-renderer:
    build:
      context: ./remotion-project
      dockerfile: Dockerfile
    container_name: video_automation_remotion
    restart: unless-stopped
    networks:
      - video-automation
    ports:
      - "3001:3001"
    environment:
      REMOTION_PORT: ${REMOTION_PORT:-3001}
      REMOTION_CONCURRENCY: ${REMOTION_CONCURRENCY:-4}
      TEMP_VIDEOS_DIR: ${TEMP_VIDEOS_DIR:-/tmp/videos}
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-Europe/Dublin}
    volumes:
      - temp_videos_data:/tmp/videos
    # Chromium necesita /dev/shm para WebGL
    shm_size: "2gb"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
